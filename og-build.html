<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@500;700;800;900&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{
    font-family:'Heebo',sans-serif;
    background:
      radial-gradient(115% 130% at 85% 5%, rgba(143,166,142,.40), transparent 50%),
      radial-gradient(85% 95% at 8% 100%, rgba(143,166,142,.20), transparent 55%),
      linear-gradient(180deg,#FFFFFF 0%, #FAF8F3 100%);
    position:relative;
  }
  .route{position:absolute;inset:0;z-index:0}
  .plane{position:absolute;top:118px;left:150px;font-size:54px;transform:rotate(-18deg);filter:drop-shadow(0 6px 12px rgba(44,49,58,.18))}
  .wrap{
    position:relative;z-index:2;height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:60px 80px;gap:40px;
  }
  .logo{height:188px;width:auto;display:block}
  h1{
    font-size:80px;line-height:1.14;font-weight:900;letter-spacing:-1.8px;color:#2C313A;white-space:nowrap;
  }
  h1 .hl{color:#6E8770}
</style>
</head>
<body>
  <svg class="route" viewBox="0 0 1200 630" preserveAspectRatio="none">
    <path d="M150 140 C 430 50, 780 80, 1110 230" fill="none" stroke="#8FA68E" stroke-width="3" stroke-dasharray="2 15" stroke-linecap="round" opacity="0.5"/>
  </svg>
  <div class="plane">✈️</div>

  <div class="wrap">
    <img class="logo" src="assets/logo.png" alt="ורד וילדר" />
    <h1>טסים לחו״ל?<br><span class="hl">ביטוח נסיעות שמתאים בדיוק לכם.</span></h1>
  </div>
</body>
</html>
